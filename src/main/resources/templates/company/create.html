<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro do Company</title>
</head>
<body class="bg-sky-950 h-screen items-center flex justify-center">
<form id="submitForm" action="" class="flex gap-24" th:action="@{/company/create}" method="post" th:object="${company}">

    <div class="space-y-8 bg-zinc-900 roudend-md p-10">
        <p class="text-white">Empresa, crie o seu cadastro gratuitamente</p>

        <div class="flex flex-row gap-10">
            <input type="text" name="username" th:field="*{username}"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Digite o seu usuário">
            <input type="text" name="name" th:field="*{name}"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Digite o seu nome">
        </div>

        <div class="flex flex-row gap-10">
            <input type="email" name="email" th:field="*{email}"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Email">
            <input type="email" name="website" th:field="*{website}"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Website">
        </div>

        <div class="flex flex-row gap-10">
            <input type="password" name="password" id="password" th:field="*{password}"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Senha">
            <input type="password" name="confirmPassword" id="confirmPassword"
                   class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"
                   placeholder="Confirme sua senha">
        </div>
        <textarea name="description" placeholder="Digite uma breve descrição sobre você" th:field="*{description}"
                  class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-4 focus:outline-none focus:ring-green-600 focus:ring-2"></textarea>

        <p class="text-red-400" th:if="${error_message}" th:text="${error_message}"></p>
        <p class="text-red-400 hidden" id="password_error">As senhas não conferem</p>

        <button class="bg-green-700 w-full p-4 rounded text-white hover:bg-green-600">Cadastrar-se</button>
        <p class="mt-4 text-white">
            Já tem uma conta? <a href="/company/login" class="text-center text-green-700 hover:text-green-600"> Faça login aqui</a>
        </p>

    </div>
    <div class="text-white max-w-80 text-6xl flex items-center">
        Gestão de Vagas
    </div>

</form>

</body>

<script>
    document.getElementById("submitForm").addEventListener("submit", (event) => {
        var password = document.getElementById("password").value;
        var confirmPassword = document.getElementById("confirmPassword").value;
        if (password !== confirmPassword) {
            document.getElementById("password_error").classList.remove("hidden");
            event.preventDefault();
        }
    })
</script>

</html>
